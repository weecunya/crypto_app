<!DOCTYPE html>
<html>
{% load static %}
<head>
    <link rel="stylesheet" href="{% static 'css/registration.css' %}">
    <title>Регистрация</title>

</head>
<body style="background: rgb(37,99,235);">
    <div class="title-container" style="text-align: center; margin-tio: 30px;">
    <h2 class="form-title" style="color: rgb(255,255,255); padding: 30px; ">Регистрация</h2>
    </div>
    <form method="post" >
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit" style="background: #0a0a0a;
                                    margin-top: 30px;">Зарегистрироваться</button>
    </form>
    <p class="form-footer" style="padding: 5px; border-color: #0a0a0a; margin: 10px;">Уже есть аккаунт? <a href="{% url 'login' %}" class="form-link" style="padding: 10px; background: #0a0a0a;
    border-radius: 5px;">Войти</a></p>
</body>
</html>
