<!DOCTYPE html>
<html>
{% load static %}
<head>
    <link rel="stylesheet" href="{% static 'css/registration.css' %}">
    <title style="color: rgb(255,255,255);">Вход</title>
</head>
<body style="background:rgb(37,99,235);">
    <h2 style="padding: 30px; color: #0a0a0a;">Вход</h2>
    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit" style="background: #0a0a0a;">Войти</button>
    </form>
    <p style="color: rgb(255,255,255);margin-left: 20px;">Нет аккаунта?
        <a href="{% url 'register' %}" style="padding: 15px; background: #0a0a0a; color: rgb(255,255,255); border-radius:15px;">Зарегистрироваться</a>
    </p>
</body>
</html>
